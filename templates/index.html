<!DOCTYPE html>
<html>
<head>
    <title>DevOps Calculator</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin-top: 50px; background-color: #f4f4f9; }
        .container { background: white; padding: 30px; border-radius: 10px; display: inline-block; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        input { padding: 10px; margin: 10px; width: 80px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; cursor: pointer; background: #28a745; color: white; border: none; border-radius: 5px; font-weight: bold; }
        button:hover { background: #218838; }
        .result-box { background: #e9ecef; color: #495057; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container">
        <h2>DevOps Simple Calculator</h2>
        <form method="POST">
            <input type="number" name="num1" value="{{ num1 }}" required placeholder="Num 1">
            <span style="font-size: 20px; font-weight: bold;"> + </span>
            <input type="number" name="num2" value="{{ num2 }}" required placeholder="Num 2">
            <br>
            <button type="submit">Calculate</button>
            <br>
            <h3>Result:</h3>
            <input type="text" class="result-box" readonly value="{{ result }}">
        </form>
    </div>
</body>
</html>
